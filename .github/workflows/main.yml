name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Build .NET solution (MedVault.API, Aspire AppHost, ServiceDefaults)
  build-dotnet:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Restore dependencies
        run: dotnet restore src/apps/api/medvault.sln

      - name: Build solution
        run: dotnet build src/apps/api/medvault.sln --configuration Release --no-restore

      - name: Run WebApplication3 tests
        run: dotnet test src/apps/api/WebApplication3/WebApplication3.csproj --configuration Release --no-build --verbosity normal
        continue-on-error: true

  # Integration tests (requires Docker for Testcontainers SQL Server)
  integration-tests:
    runs-on: ubuntu-latest
    needs: build-dotnet

    env:
      TESTCONTAINERS_RYUK_DISABLED: true
      DOTNET_TESTCONTAINERS_HOST_OVERRIDE: unix:///var/run/docker.sock

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Install Aspire workload
        run: dotnet workload install aspire

      - name: Verify Docker is running
        run: docker info

      - name: Pre-pull SQL Server image
        run: docker pull mcr.microsoft.com/mssql/server:2022-latest

      - name: Restore dependencies
        run: dotnet restore tests/backend/MedVault.API.IntegrationTests/MedVault.API.IntegrationTests.csproj

      - name: Run MedVault.API Integration Tests
        run: dotnet test tests/backend/MedVault.API.IntegrationTests/MedVault.API.IntegrationTests.csproj --configuration Release --verbosity normal

  # Build and test Flutter app
  build-and-test-flutter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"

      - name: Get dependencies for medvault
        working-directory: ./src/apps/mobile/medvault
        run: flutter pub get

      - name: Analyze medvault
        working-directory: ./src/apps/mobile/medvault
        run: flutter analyze

      - name: Run medvault tests
        working-directory: ./src/apps/mobile/medvault
        run: flutter test
        continue-on-error: true

      - name: Build medvault APK
        working-directory: ./src/apps/mobile/medvault
        run: flutter build apk --release
        continue-on-error: true

