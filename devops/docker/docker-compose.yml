# ─────────────────────────────────────────────────────────────
# MedVault Docker Compose
# ─────────────────────────────────────────────────────────────
# Usage (from repo root):
#   docker compose -f devops/docker/docker-compose.yml up -d
#   docker compose -f devops/docker/docker-compose.yml down -v
# ─────────────────────────────────────────────────────────────

services:
  # ═══ SQL Server ═══════════════════════════════════════════
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: medvault-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD:-MedVault_Dev123!}"
      MSSQL_PID: Developer
    ports:
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - medvault-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -C -b -o /dev/null || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ═══ MedVault.API ═════════════════════════════════════════
  medvault-api:
    build:
      context: ../../
      dockerfile: devops/docker/MedVault.API.Dockerfile
    container_name: medvault-api
    ports:
      - "${API_PORT:-5100}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=MedVaultDb;User Id=sa;Password=${SQL_SA_PASSWORD:-MedVault_Dev123!};TrustServerCertificate=True;MultipleActiveResultSets=true"
      Jwt__Key: "${JWT_KEY:-DEV-ONLY-SECRET-KEY-CHANGE-IN-PRODUCTION-1234567890!}"
      Jwt__SecretKey: "${JWT_KEY:-DEV-ONLY-SECRET-KEY-CHANGE-IN-PRODUCTION-1234567890!}"
      Jwt__Issuer: "MedVault.API"
      Jwt__Audience: "MedVault.Client"
      Jwt__AccessTokenExpirationMinutes: "120"
      Jwt__RefreshTokenExpirationDays: "90"
      Google__ClientId: "${GOOGLE_CLIENT_ID:-YOUR-GOOGLE-CLIENT-ID.apps.googleusercontent.com}"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - medvault-network
    restart: unless-stopped
volumes:
  sqlserver-data:
    driver: local

networks:
  medvault-network:
    driver: bridge
